<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT-like Chatbot</title>
    <style>
        body {
            background: #23272f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .main-layout {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #20232a;
            border-right: 1px solid #333;
            padding: 24px 0 0 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 18px;
            color: #b3b3b3;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }
        .history-item {
            background: #282c34;
            color: #fff;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 0.98rem;
            transition: background 0.2s;
        }
        .history-item:hover {
            background: #0078d4;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2c313a;
            border-radius: 0 12px 12px 0;
            box-shadow: 0 2px 16px rgba(0,0,0,0.2);
            height: 100vh;
            position: relative;
        }
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px 80px 16px;
        }
        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            margin-bottom: 12px;
            word-break: break-word;
            font-size: 1rem;
        }
        .user {
            background: #0078d4;
            color: #fff;
            align-self: flex-end;
        }
        .bot {
            background: #444b57;
            color: #fff;
            align-self: flex-start;
        }
        .input-area {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: #23272f;
            padding: 16px;
            display: flex;
            justify-content: center;
            border-top: 1px solid #333;
        }
        .input-area input {
            width: 70%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            margin-right: 8px;
            background: #2c313a;
            color: #fff;
        }
        .input-area button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: #0078d4;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        .input-area button:hover {
            background: #005fa3;
        }
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100vw; border-right: none; border-bottom: 1px solid #333; border-radius: 0; }
            .chat-container { border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <h2>Chat History</h2>
            <div class="history-list" id="historyList"></div>
        </div>
        <div class="chat-container">
            <div class="chat-history" id="chatHistory"></div>
            <form class="input-area" id="chatForm">
                <input type="text" id="query" placeholder="Type your message..." autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
    <script>
        const chatHistory = document.getElementById('chatHistory');
        const chatForm = document.getElementById('chatForm');
        const queryInput = document.getElementById('query');
        const historyList = document.getElementById('historyList');
        let chatSessions = [];

        function addBubble(text, sender) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + sender;
            bubble.innerHTML = text;
            chatHistory.appendChild(bubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function addHistoryItem(query, sessionIndex) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = query;
            item.onclick = function() {
                loadSession(sessionIndex);
            };
            historyList.insertBefore(item, historyList.firstChild);
        }

        function loadSession(index) {
            chatHistory.innerHTML = '';
            const session = chatSessions[index];
            for (const msg of session) {
                addBubble(msg.text, msg.sender);
            }
        }

        chatForm.onsubmit = async function(e) {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query) return;
            // Start new session
            const session = [];
            session.push({ text: query, sender: 'user' });
            addBubble(query, 'user');
            queryInput.value = '';
            addBubble('Thinking...', 'bot');
            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const data = await res.json();
            // Remove the 'Thinking...' bubble
            chatHistory.removeChild(chatHistory.lastChild);
            session.push({ text: data.answer, sender: 'bot' });
            addBubble(data.answer, 'bot');
            chatSessions.push(session);
            addHistoryItem(query, chatSessions.length - 1);
        };
    </script>
</body>
</html>
